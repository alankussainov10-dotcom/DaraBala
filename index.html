<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>English Grade 3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f1f8e9; min-height: 100vh; overflow-x: hidden; }

  @keyframes popIn { 0%{transform:scale(0.85) translateY(24px);opacity:0} 100%{transform:scale(1) translateY(0);opacity:1} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  @keyframes bounceLoop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes floatBadge { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-6px)} }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes chatPop { 0%{transform:scale(0.8) translateY(20px);opacity:0} 100%{transform:scale(1) translateY(0);opacity:1} }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .anim-pop { animation: popIn .4s cubic-bezier(.175,.885,.32,1.275) both; }
  .anim-shake { animation: shake .45s ease-in-out; }

  .view { display: none; }
  .view.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ===== ONBOARDING ===== */
  #view-onboarding { align-items: center; justify-content: center; padding: 24px; }
  .card {
    background: #fff; border-radius: 32px; padding: 36px 32px;
    width: 100%; max-width: 480px;
    box-shadow: 0 8px 40px rgba(0,0,0,.10); border-bottom: 8px solid #c5e1a5;
  }
  .ob-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
  .ob-logo-icon { width: 80px; height: 80px; background: #aed581; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 14px; }
  .ob-logo h1 { font-size: 30px; font-weight: 900; color: #33691e; }
  .ob-logo p  { color: #558b2f; font-weight: 700; margin-top: 4px; }
  .ob-step { display: none; }
  .ob-step.active { display: block; animation: fadeSlide .35s ease both; }
  .ob-step h2 { font-size: 22px; font-weight: 800; text-align: center; color: #222; margin-bottom: 20px; }
  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-wrap .icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #aaa; width: 22px; height: 22px; pointer-events: none; }
  .input-wrap input { width: 100%; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700; background: #f9f9f9; border: 2px solid #e0e0e0; border-radius: 18px; padding: 14px 16px 14px 48px; outline: none; color: #333; transition: border-color .2s; }
  .input-wrap input:focus { border-color: #8bc34a; background: #fff; }

  .avatar-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
  .avatar-grid::-webkit-scrollbar { width: 6px; }
  .avatar-grid::-webkit-scrollbar-thumb { background: #c5e1a5; border-radius: 3px; }
  .avatar-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 8px; border-radius: 20px; border: 3px solid #f0f0f0; background: #fff; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: #555; transition: border-color .2s, transform .1s; }
  .avatar-btn:hover { border-color: #c5e1a5; transform: scale(1.05); }
  .avatar-btn.sel { border-color: #8bc34a; background: #f1f8e9; }
  .av-emoji { font-size: 40px; margin-bottom: 6px; }

  .btn-green { display: block; width: 100%; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: #fff; background: #8bc34a; border: none; border-radius: 18px; padding: 16px; cursor: pointer; border-bottom: 5px solid #689f38; transition: transform .1s, border-bottom-width .1s, background .15s; user-select: none; }
  .btn-green:hover:not(:disabled) { background: #7cb342; }
  .btn-green:active:not(:disabled) { border-bottom-width: 0; transform: translateY(5px); }
  .btn-green:disabled { background: #d0d0d0; border-bottom-color: #bbb; cursor: not-allowed; }

  /* ===== DASHBOARD ===== */
  #view-dashboard { background: #f1f8e9; }
  .topbar { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.88); backdrop-filter: blur(10px); border-bottom: 1.5px solid #e8e8e8; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
  .topbar-user { display: flex; align-items: center; gap: 10px; }
  .topbar-avatar { width: 44px; height: 44px; background: #e8f5e9; border: 2.5px solid #8bc34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .topbar-name { font-weight: 800; color: #444; font-size: 15px; }
  .topbar-stats { display: flex; gap: 10px; }
  .stat-pill { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 15px; padding: 6px 14px; border-radius: 20px; border: 1.5px solid; }
  .stat-pill.xp { color: #1565c0; background: #e3f2fd; border-color: #bbdefb; }
  .stat-pill.streak { color: #e65100; background: #fff3e0; border-color: #ffcc80; }
  .stat-pill.streak.dead { color: #aaa; background: #f5f5f5; border-color: #e0e0e0; }
  .stat-pill svg { width: 20px; height: 20px; }
  .map-container { max-width: 480px; margin: 0 auto; padding: 28px 20px 100px; display: flex; flex-direction: column; align-items: center; }
  .module-header { width: 100%; border-radius: 28px; padding: 22px 24px; color: #fff; box-shadow: 0 6px 24px rgba(0,0,0,.13); border-bottom: 6px solid rgba(0,0,0,.12); margin-bottom: 28px; position: relative; overflow: hidden; }
  .module-header h3 { font-size: 28px; font-weight: 900; }
  .module-header p  { font-size: 16px; font-weight: 700; opacity: .9; margin-top: 2px; }
  .module-header .mod-icon { position: absolute; right: -14px; bottom: -14px; font-size: 90px; opacity: .18; transform: rotate(-12deg); }
  .lessons-col { display: flex; flex-direction: column; align-items: center; gap: 22px; width: 100%; margin-bottom: 36px; }
  .node-wrap { position: relative; }
  .lesson-node { width: 76px; height: 76px; border-radius: 50%; border: none; border-bottom: 6px solid rgba(0,0,0,.15); display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900; color: #fff; cursor: pointer; transition: transform .12s, border-bottom-width .12s; user-select: none; box-shadow: 0 4px 12px rgba(0,0,0,.10); }
  .lesson-node:hover:not(.locked) { transform: scale(1.08); }
  .lesson-node:active:not(.locked) { border-bottom-width: 0; transform: translateY(6px); }
  .lesson-node.locked { background: #d9d9d9; border-bottom-color: #bbb; color: #888; cursor: not-allowed; }
  .lesson-node.done { background: #ffc107; border-bottom-color: #ff9800; }
  .float-badge { position: absolute; top: -46px; left: 50%; transform: translateX(-50%); background: #fff; border: 2px solid #e8e8e8; border-radius: 18px; padding: 6px 16px; font-size: 14px; font-weight: 800; color: #444; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.10); animation: floatBadge 2s ease-in-out infinite; z-index: 10; }
  .float-badge::after { content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 12px; height: 12px; background: #fff; border-right: 2px solid #e8e8e8; border-bottom: 2px solid #e8e8e8; }
  .connector { position: absolute; top: 76px; left: 50%; transform: translateX(-50%); width: 14px; height: 22px; background: #d0e8b8; border-radius: 7px; }

  /* ===== LESSON ===== */
  #view-lesson { background: #fff; }
  .lesson-topbar { position: sticky; top: 0; z-index: 50; background: #fff; border-bottom: 2px solid #f0f0f0; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .close-btn { background: none; border: none; cursor: pointer; color: #aaa; padding: 4px; border-radius: 8px; flex-shrink: 0; }
  .close-btn svg { width: 24px; height: 24px; display: block; }
  .progress-bar-wrap { flex: 1; height: 20px; background: #eee; border-radius: 10px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #8bc34a; border-radius: 10px; transition: width .6s ease; position: relative; }
  .progress-bar-fill::after { content: ''; position: absolute; top: 4px; left: 6px; right: 6px; height: 5px; background: rgba(255,255,255,.35); border-radius: 3px; }
  .lesson-content { flex: 1; max-width: 640px; width: 100%; margin: 0 auto; padding: 28px 20px 0; }
  .lesson-question { font-size: 26px; font-weight: 900; color: #1a1a1a; text-align: center; margin-bottom: 28px; line-height: 1.3; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .opt-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 12px; border-radius: 24px; border: 3px solid #e0e0e0; background: #fff; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; color: #444; border-bottom-width: 5px; transition: transform .1s, border-color .15s, background .15s, opacity .2s; user-select: none; }
  .opt-btn .opt-emoji { font-size: 52px; margin-bottom: 10px; }
  .opt-btn:hover:not(:disabled):not(.sel):not(.correct):not(.wrong) { background: #fafafa; border-color: #bbb; }
  .opt-btn:active:not(:disabled) { transform: translateY(5px); border-bottom-width: 0; }
  .opt-btn.sel     { border-color: #42a5f5; background: #e3f2fd; color: #1565c0; }
  .opt-btn.correct { border-color: #7cb342; background: #f1f8e9; color: #558b2f; }
  .opt-btn.wrong   { border-color: #ef5350; background: #ffebee; color: #c62828; }
  .opt-btn.dim     { opacity: .45; filter: grayscale(40%); }
  .opt-btn:disabled { cursor: not-allowed; }
  .lesson-footer { padding: 16px 20px; border-top: 2px solid; transition: background .25s, border-color .25s; position: sticky; bottom: 0; z-index: 40; }
  .lesson-footer.neutral { background: #fff; border-color: #f0f0f0; }
  .lesson-footer.good    { background: #f1f8e9; border-color: #aed581; }
  .lesson-footer.bad     { background: #ffebee; border-color: #ef9a9a; }
  .footer-inner { max-width: 640px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .feedback-text { flex: 1; }
  .feedback-text .fb-main { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 900; }
  .feedback-text .fb-main.good { color: #558b2f; }
  .feedback-text .fb-main.bad  { color: #c62828; }
  .feedback-text .fb-sub { font-size: 14px; font-weight: 700; color: #888; margin-bottom: 2px; }
  .check-icon { font-size: 32px; animation: bounceLoop 1.5s ease-in-out infinite; }
  .btn-check { flex-shrink: 0; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: #fff; border: none; border-radius: 16px; padding: 14px 32px; cursor: pointer; border-bottom: 5px solid; transition: transform .1s, border-bottom-width .1s, background .15s; user-select: none; }
  .btn-check.green { background: #8bc34a; border-bottom-color: #689f38; }
  .btn-check.green:hover:not(:disabled) { background: #7cb342; }
  .btn-check.red   { background: #ef5350; border-bottom-color: #c62828; }
  .btn-check:active:not(:disabled) { border-bottom-width: 0; transform: translateY(5px); }
  .btn-check:disabled { background: #d9d9d9; border-bottom-color: #bbb; cursor: not-allowed; opacity: .7; }

  /* ===== AI CHAT WIDGET ===== */
  #chat-widget { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }

  #chat-toggle {
    width: 64px; height: 64px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #8bc34a, #558b2f);
    box-shadow: 0 6px 20px rgba(139,195,74,.5);
    cursor: pointer; font-size: 32px;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, box-shadow .2s;
    border-bottom: 4px solid #33691e;
  }
  #chat-toggle:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(139,195,74,.6); }
  #chat-toggle:active { transform: scale(0.95); }

  /* Пульсирующая точка — новое сообщение */
  #chat-dot { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; background: #ff5722; border-radius: 50%; border: 2px solid #fff; display: none; }
  #chat-dot.show { display: block; animation: bounceLoop 1s ease-in-out infinite; }

  #chat-box {
    position: absolute; bottom: 76px; right: 0;
    width: 320px; background: #fff; border-radius: 24px;
    box-shadow: 0 12px 48px rgba(0,0,0,.18);
    border: 2px solid #e8f5e9;
    display: none; flex-direction: column;
    overflow: hidden; animation: chatPop .3s ease both;
    max-height: 480px;
  }
  #chat-box.open { display: flex; }

  .chat-header {
    background: linear-gradient(135deg, #8bc34a, #558b2f);
    padding: 14px 16px; display: flex; align-items: center; gap: 10px;
  }
  .chat-header-avatar { font-size: 28px; }
  .chat-header-info { flex: 1; }
  .chat-header-name { font-size: 15px; font-weight: 900; color: #fff; }
  .chat-header-status { font-size: 12px; color: rgba(255,255,255,.8); font-weight: 600; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 14px 12px; display: flex;
    flex-direction: column; gap: 10px; min-height: 200px; max-height: 280px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #c5e1a5; border-radius: 2px; }

  .msg { display: flex; gap: 8px; animation: msgIn .25s ease both; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 18px; font-size: 14px;
    font-weight: 700; line-height: 1.4; max-width: 220px; word-break: break-word;
  }
  .msg.bot  .msg-bubble { background: #f1f8e9; color: #33691e; border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: #8bc34a; color: #fff; border-bottom-right-radius: 4px; }
  .msg-av { font-size: 22px; flex-shrink: 0; align-self: flex-end; }

  .typing-indicator { display: flex; gap: 4px; padding: 10px 14px; background: #f1f8e9; border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
  .typing-indicator span { width: 7px; height: 7px; background: #8bc34a; border-radius: 50%; animation: bounceLoop .8s ease-in-out infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .15s; }
  .typing-indicator span:nth-child(3) { animation-delay: .3s; }

  .chat-input-wrap { padding: 10px 12px; border-top: 1.5px solid #f0f0f0; display: flex; gap: 8px; }
  .chat-input {
    flex: 1; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    border: 2px solid #e0e0e0; border-radius: 14px; padding: 10px 12px;
    outline: none; color: #333; transition: border-color .2s;
  }
  .chat-input:focus { border-color: #8bc34a; }
  .chat-send {
    width: 40px; height: 40px; border-radius: 12px; border: none;
    background: #8bc34a; color: #fff; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s;
    flex-shrink: 0;
  }
  .chat-send:hover { background: #7cb342; }
  .chat-send:active { transform: scale(0.92); }
  .chat-send:disabled { background: #d0d0d0; cursor: not-allowed; }

  /* Module colors */
  .mc-0{background:#4caf50} .mc-1{background:#26a69a} .mc-2{background:#26c6da}
  .mc-3{background:#29b6f6} .mc-4{background:#42a5f5} .mc-5{background:#5c6bc0}
  .mc-6{background:#7e57c2} .mc-7{background:#ab47bc} .mc-8{background:#e040fb}
</style>
</head>
<body>

<!-- ===== ONBOARDING ===== -->
<div id="view-onboarding" class="view active">
  <div class="card">
    <div class="ob-logo">
      <div class="ob-logo-icon">🇰🇿</div>
      <h1>English Grade 3</h1>
      <p>Давай учить английский вместе!</p>
    </div>
    <div id="ob-step1" class="ob-step active">
      <h2>Как тебя зовут?</h2>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="input-name" placeholder="Введи своё имя" autocomplete="off" oninput="checkStep1()"/>
      </div>
      <button class="btn-green" id="btn-step1" disabled onclick="goStep(2)">Дальше</button>
    </div>
    <div id="ob-step2" class="ob-step">
      <h2>Когда твой день рождения?</h2>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input type="date" id="input-dob" oninput="checkStep2()"/>
      </div>
      <button class="btn-green" id="btn-step2" disabled onclick="goStep(3)">Дальше</button>
    </div>
    <div id="ob-step3" class="ob-step">
      <h2>Выбери своего героя</h2>
      <div class="avatar-grid" id="avatar-grid"></div>
      <button class="btn-green" id="btn-step3" disabled onclick="finishOnboarding()">Начать учиться!</button>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="view-dashboard" class="view">
  <div class="topbar">
    <div class="topbar-user">
      <div class="topbar-avatar" id="tb-avatar"></div>
      <span class="topbar-name" id="tb-name"></span>
    </div>
    <div class="topbar-stats">
      <div class="stat-pill xp">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span id="xp-val">0 XP</span>
      </div>
      <div class="stat-pill streak dead" id="stat-streak">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="flame-icon"><path d="M12 2c0 0-5 5-5 11a5 5 0 0 0 10 0C17 7 12 2 12 2z"/></svg>
        <span id="streak-val">0</span>
      </div>
    </div>
  </div>
  <div class="map-container" id="map-container"></div>
</div>

<!-- ===== LESSON ===== -->
<div id="view-lesson" class="view">
  <div class="lesson-topbar">
    <button class="close-btn" onclick="exitLesson()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="lesson-progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="lesson-content">
    <div class="lesson-question" id="lesson-question"></div>
    <div class="options-grid" id="options-grid"></div>
  </div>
  <div class="lesson-footer neutral" id="lesson-footer">
    <div class="footer-inner">
      <div class="feedback-text" id="feedback-area"></div>
      <button class="btn-check green" id="btn-check" disabled onclick="handleCheck()">Проверить</button>
    </div>
  </div>
</div>

<!-- ===== AI CHAT WIDGET ===== -->
<div id="chat-widget" style="display:none">
  <div id="chat-box">
    <div class="chat-header">
      <div class="chat-header-avatar" id="chat-av">🦊</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chat-name">Лисичка</div>
        <div class="chat-header-status">Учитель английского 🌟</div>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <input class="chat-input" id="chat-input" placeholder="Спроси что-нибудь..." onkeydown="if(event.key==='Enter')sendChat()"/>
      <button class="chat-send" id="chat-send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>
  <button id="chat-toggle" onclick="toggleChat()">
    <span id="chat-toggle-emoji">🦊</span>
  </button>
  <div id="chat-dot"></div>
</div>

<script>
// ============ CONFIG ============
const WORKER_URL = 'https://gemini-proxy.alankussainov10.workers.dev';

// ============ DATA ============
const MODULES = [
  {id:1,title:"Hello, English!",lessons:6},
  {id:2,title:"My School",lessons:8},
  {id:3,title:"People I Love",lessons:8},
  {id:4,title:"Weather",lessons:8},
  {id:5,title:"My Free Time",lessons:8},
  {id:6,title:"Health",lessons:8},
  {id:7,title:"Buildings",lessons:8},
  {id:8,title:"My Holidays",lessons:8},
  {id:9,title:"Reserves & Round-up",lessons:6}
];

const AVATARS = [
  {id:'fox',      emoji:'🦊', name:'Лисичка',   personality:'весёлая и хитрая лисичка'},
  {id:'bear',     emoji:'🐻', name:'Мишка',     personality:'добрый и медлительный мишка'},
  {id:'panda',    emoji:'🐼', name:'Панда',     personality:'спокойная и умная панда'},
  {id:'tiger',    emoji:'🐯', name:'Тигрёнок',  personality:'смелый и энергичный тигрёнок'},
  {id:'lion',     emoji:'🦁', name:'Лёвушка',   personality:'гордый и благородный львёнок'},
  {id:'elephant', emoji:'🐘', name:'Слонёнок',  personality:'добрый и умный слонёнок'},
  {id:'bunny',    emoji:'🐰', name:'Зайка',     personality:'быстрая и весёлая зайка'},
  {id:'penguin',  emoji:'🐧', name:'Пингви',    personality:'аккуратный и смешной пингвин'},
  {id:'owl',      emoji:'🦉', name:'Совёнок',   personality:'мудрый и вдумчивый совёнок'},
  {id:'cat',      emoji:'🐱', name:'Котёнок',   personality:'игривый и ласковый котёнок'},
  {id:'dog',      emoji:'🐶', name:'Щенок',     personality:'верный и жизнерадостный щенок'},
  {id:'frog',     emoji:'🐸', name:'Лягушка',   personality:'прыгучая и весёлая лягушка'},
  {id:'koala',    emoji:'🐨', name:'Коала',     personality:'спокойная и милая коала'},
  {id:'unicorn',  emoji:'🦄', name:'Единорог',  personality:'волшебный и добрый единорог'},
  {id:'dragon',   emoji:'🐲', name:'Дракончик', personality:'храбрый и дружелюбный дракончик'},
  {id:'hamster',  emoji:'🐹', name:'Хомяк',    personality:'запасливый и смешной хомяк'},
];

const QUESTIONS = [
  {text:'Как сказать «Привет»?',opts:[{id:'a',t:'Goodbye',e:'👋'},{id:'b',t:'Hello',e:'🖐️'},{id:'c',t:'Apple',e:'🍎'},{id:'d',t:'Dog',e:'🐶'}],ans:'b'},
  {text:'Выбери правильный перевод: «Школьный рюкзак»',opts:[{id:'a',t:'Pencil case',e:'✏️'},{id:'b',t:'Schoolbag',e:'🎒'},{id:'c',t:'Rubber',e:'🧽'},{id:'d',t:'Pen',e:'🖊️'}],ans:'b'},
  {text:'Где здесь «Кот»?',opts:[{id:'a',t:'Cat',e:'🐱'},{id:'b',t:'Dog',e:'🐶'},{id:'c',t:'Bird',e:'🐦'},{id:'d',t:'Fish',e:'🐟'}],ans:'a'},
  {text:'Как сказать «Я» по-английски?',opts:[{id:'a',t:'You',e:'👉'},{id:'b',t:'He',e:'👦'},{id:'c',t:'I',e:'🙋‍♂️'},{id:'d',t:'She',e:'👧'}],ans:'c'},
  {text:'Что означает слово «Red»?',opts:[{id:'a',t:'Синий',e:'🔵'},{id:'b',t:'Зелёный',e:'🟢'},{id:'c',t:'Красный',e:'🔴'},{id:'d',t:'Жёлтый',e:'🟡'}],ans:'c'}
];

// ============ STATE ============
let user = null;
let progress = {completed:[],currentId:1,streak:0,xp:0};
let lesson = {id:null,qIdx:0,sel:null,checked:false,score:0};
let obAvatar = null;
let chatOpen = false;
let chatHistory = [];
let chatWaiting = false;

// ============ ONBOARDING ============
(function(){
  const grid = document.getElementById('avatar-grid');
  AVATARS.forEach(av => {
    const btn = document.createElement('button');
    btn.className = 'avatar-btn';
    btn.innerHTML = `<span class="av-emoji">${av.emoji}</span><span>${av.name}</span>`;
    btn.onclick = () => {
      obAvatar = av;
      document.querySelectorAll('.avatar-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      document.getElementById('btn-step3').disabled = false;
    };
    grid.appendChild(btn);
  });
})();

function checkStep1(){ document.getElementById('btn-step1').disabled = document.getElementById('input-name').value.trim().length < 2; }
function checkStep2(){ document.getElementById('btn-step2').disabled = !document.getElementById('input-dob').value; }
function goStep(n){ document.querySelectorAll('.ob-step').forEach(s=>s.classList.remove('active')); document.getElementById('ob-step'+n).classList.add('active'); }

function finishOnboarding(){
  user = { name: document.getElementById('input-name').value.trim(), dob: document.getElementById('input-dob').value, avatar: obAvatar };
  // Setup chat widget
  document.getElementById('chat-av').textContent = user.avatar.emoji;
  document.getElementById('chat-name').textContent = user.avatar.name;
  document.getElementById('chat-toggle-emoji').textContent = user.avatar.emoji;
  document.getElementById('chat-widget').style.display = 'block';
  // Send welcome message
  setTimeout(() => {
    addBotMessage(`Привет, ${user.name}! 👋 Я ${user.avatar.name} — твой помощник в изучении английского! Спрашивай меня что угодно — слова, правила, переводы. Я помогу! 🌟`);
    document.getElementById('chat-dot').classList.add('show');
  }, 1000);
  showDashboard();
}

// ============ DASHBOARD ============
function showDashboard(){
  switchView('dashboard');
  document.getElementById('tb-avatar').textContent = user.avatar.emoji;
  document.getElementById('tb-name').textContent = user.name;
  updateTopbar();
  buildMap();
}

function updateTopbar(){
  document.getElementById('xp-val').textContent = progress.xp + ' XP';
  document.getElementById('streak-val').textContent = progress.streak;
  const sp = document.getElementById('stat-streak');
  const fi = document.getElementById('flame-icon');
  if(progress.streak > 0){ sp.classList.remove('dead'); fi.setAttribute('fill','currentColor'); fi.setAttribute('stroke','none'); }
  else { sp.classList.add('dead'); fi.setAttribute('fill','none'); fi.setAttribute('stroke','currentColor'); }
}

function buildMap(){
  const container = document.getElementById('map-container');
  container.innerHTML = '';
  let gid = 1;
  MODULES.forEach((mod,mi) => {
    const mh = document.createElement('div');
    mh.className = `module-header mc-${mi}`;
    mh.innerHTML = `<div style="position:relative;z-index:1"><h3>Unit ${mod.id}</h3><p>${mod.title}</p></div><div class="mod-icon">📖</div>`;
    container.appendChild(mh);
    const col = document.createElement('div');
    col.className = 'lessons-col';
    for(let i=0;i<mod.lessons;i++){
      const lid=gid++, done=progress.completed.includes(lid), current=progress.currentId===lid, locked=lid>progress.currentId;
      const wrap=document.createElement('div'); wrap.className='node-wrap'; wrap.style.transform=`translateX(${Math.sin(i*1.5)*42}px)`;
      if(i<mod.lessons-1){const c=document.createElement('div');c.className='connector';wrap.appendChild(c);}
      if(current){const b=document.createElement('div');b.className='float-badge';b.textContent='Start!';wrap.appendChild(b);}
      const btn=document.createElement('button');
      btn.className='lesson-node'+(done?' done':locked?' locked':` mc-${mi}`);
      btn.disabled=locked; btn.innerHTML=done?'⭐':locked?'🔒':`<span>${i+1}</span>`;
      if(!locked) btn.onclick=()=>startLesson(lid);
      wrap.appendChild(btn); col.appendChild(wrap);
    }
    container.appendChild(col);
  });
}

// ============ LESSON ============
function startLesson(lid){ lesson={id:lid,qIdx:0,sel:null,checked:false,score:0}; switchView('lesson'); renderQuestion(); }

function renderQuestion(){
  const q=QUESTIONS[lesson.qIdx];
  document.getElementById('lesson-progress-fill').style.width=(lesson.qIdx/QUESTIONS.length*100)+'%';
  const qEl=document.getElementById('lesson-question'); qEl.textContent=q.text; qEl.classList.remove('anim-pop'); void qEl.offsetWidth; qEl.classList.add('anim-pop');
  const grid=document.getElementById('options-grid'); grid.innerHTML='';
  q.opts.forEach(opt=>{
    const btn=document.createElement('button'); btn.className='opt-btn'; btn.dataset.id=opt.id;
    btn.innerHTML=`<span class="opt-emoji">${opt.e}</span><span>${opt.t}</span>`;
    btn.onclick=()=>selectOpt(opt.id,btn); grid.appendChild(btn);
  });
  setFooter('neutral','');
  const cb=document.getElementById('btn-check'); cb.textContent='Проверить'; cb.className='btn-check green'; cb.disabled=true; cb.onclick=handleCheck;
  lesson.sel=null; lesson.checked=false;
}

function selectOpt(id,btn){ if(lesson.checked)return; lesson.sel=id; document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); document.getElementById('btn-check').disabled=false; }

function handleCheck(){
  if(lesson.checked)return; lesson.checked=true;
  const q=QUESTIONS[lesson.qIdx]; const correct=lesson.sel===q.ans;
  if(correct) lesson.score+=20;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true; const bid=b.dataset.id;
    if(bid===q.ans){b.classList.remove('sel');b.classList.add('correct');}
    else if(bid===lesson.sel&&!correct){b.classList.remove('sel');b.classList.add('wrong');void b.offsetWidth;b.classList.add('anim-shake');setTimeout(()=>b.classList.remove('anim-shake'),500);}
    else b.classList.add('dim');
  });
  const cb=document.getElementById('btn-check'); cb.onclick=handleContinue;
  document.getElementById('lesson-progress-fill').style.width=((lesson.qIdx+1)/QUESTIONS.length*100)+'%';
  if(correct){setFooter('good',`<div class="fb-main good"><span class="check-icon">✅</span> Великолепно!</div>`);cb.className='btn-check green';}
  else{const ct=q.opts.find(o=>o.id===q.ans).t;setFooter('bad',`<div class="fb-sub">Правильный ответ:</div><div class="fb-main bad">${ct}</div>`);cb.className='btn-check red';}
  cb.textContent='Дальше'; cb.disabled=false;
}

function handleContinue(){ if(lesson.qIdx<QUESTIONS.length-1){lesson.qIdx++;lesson.checked=false;renderQuestion();}else{completeLesson(lesson.score);} }
function setFooter(state,html){ document.getElementById('lesson-footer').className='lesson-footer '+state; document.getElementById('feedback-area').innerHTML=html; }
function completeLesson(score){ const lid=lesson.id,isNew=!progress.completed.includes(lid); if(isNew){progress.completed.push(lid);progress.currentId=lid+1;if(progress.streak===0)progress.streak=1;} progress.xp+=score>80?15:10; showDashboard(); }
function exitLesson(){ showDashboard(); }

// ============ AI CHAT ============
function toggleChat(){
  chatOpen=!chatOpen;
  const box=document.getElementById('chat-box');
  box.classList.toggle('open',chatOpen);
  document.getElementById('chat-dot').classList.remove('show');
  if(chatOpen) setTimeout(()=>document.getElementById('chat-input').focus(),100);
}

function addBotMessage(text){
  const msgs=document.getElementById('chat-messages');
  const div=document.createElement('div'); div.className='msg bot';
  div.innerHTML=`<div class="msg-av">${user?user.avatar.emoji:'🤖'}</div><div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function addUserMessage(text){
  const msgs=document.getElementById('chat-messages');
  const div=document.createElement('div'); div.className='msg user';
  div.innerHTML=`<div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const msgs=document.getElementById('chat-messages');
  const div=document.createElement('div'); div.className='msg bot'; div.id='typing-msg';
  div.innerHTML=`<div class="msg-av">${user.avatar.emoji}</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){ const t=document.getElementById('typing-msg'); if(t)t.remove(); }

async function sendChat(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim(); if(!text||chatWaiting)return;
  input.value=''; chatWaiting=true;
  document.getElementById('chat-send-btn').disabled=true;
  addUserMessage(text);
  chatHistory.push({role:'user',parts:[{text}]});
  showTyping();

  const systemPrompt = `Ты ${user.avatar.name} — ${user.avatar.personality}. Ты помогаешь ученику 3 класса учить английский язык. Отвечай коротко, дружелюбно и с эмодзи. Всегда отвечай на русском языке, но английские слова и примеры приводи на английском. Имя ученика: ${user.name}.`;

  try {
    const response = await fetch(WORKER_URL + '/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        message: systemPrompt + '\n\nВопрос ученика: ' + text
      })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.reply || 'Упс, что-то пошло не так 😅';
    addBotMessage(reply);
    chatHistory.push({role:'model',parts:[{text:reply}]});
  } catch(e) {
    removeTyping();
    addBotMessage('Ой, я сейчас не могу ответить 😅 Попробуй позже!');
  }
  chatWaiting=false;
  document.getElementById('chat-send-btn').disabled=false;
}

// ============ VIEWS ============
function switchView(name){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('view-'+name).classList.add('active'); window.scrollTo(0,0); }
</script>
