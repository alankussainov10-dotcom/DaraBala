<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>English Grade 3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f1f8e9; min-height: 100vh; overflow-x: hidden; }

  @keyframes popIn {
    0%   { transform: scale(0.85) translateY(24px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60%  { transform: translateX(-8px); }
    40%,80%  { transform: translateX(8px); }
  }
  @keyframes bounceLoop {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  @keyframes floatBadge {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-6px); }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }

  .anim-pop   { animation: popIn .4s cubic-bezier(.175,.885,.32,1.275) both; }
  .anim-shake { animation: shake .45s ease-in-out; }
  .anim-slide { animation: fadeSlide .35s ease both; }

  .view { display: none; }
  .view.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ===== ONBOARDING ===== */
  #view-onboarding { align-items: center; justify-content: center; padding: 24px; }

  .card {
    background: #fff; border-radius: 32px; padding: 36px 32px;
    width: 100%; max-width: 480px;
    box-shadow: 0 8px 40px rgba(0,0,0,.10);
    border-bottom: 8px solid #c5e1a5;
  }

  .ob-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
  .ob-logo-icon {
    width: 80px; height: 80px; background: #aed581; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    margin-bottom: 14px; box-shadow: inset 0 3px 8px rgba(0,0,0,.12);
  }
  .ob-logo h1 { font-size: 30px; font-weight: 900; color: #33691e; }
  .ob-logo p  { color: #558b2f; font-weight: 700; margin-top: 4px; }

  .ob-step { display: none; }
  .ob-step.active { display: block; animation: fadeSlide .35s ease both; }
  .ob-step h2 { font-size: 22px; font-weight: 800; text-align: center; color: #222; margin-bottom: 20px; }

  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-wrap .icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: #aaa; width: 22px; height: 22px; pointer-events: none;
  }
  .input-wrap input {
    width: 100%; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700;
    background: #f9f9f9; border: 2px solid #e0e0e0; border-radius: 18px;
    padding: 14px 16px 14px 48px; transition: border-color .2s, background .2s;
    outline: none; color: #333;
  }
  .input-wrap input:focus { border-color: #8bc34a; background: #fff; }

  /* Avatar grid - scrollable for 16 heroes */
  .avatar-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 20px;
    max-height: 360px; overflow-y: auto;
    padding-right: 4px;
  }
  .avatar-grid::-webkit-scrollbar { width: 6px; }
  .avatar-grid::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 3px; }
  .avatar-grid::-webkit-scrollbar-thumb { background: #c5e1a5; border-radius: 3px; }

  .avatar-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 12px 8px; border-radius: 20px; border: 3px solid #f0f0f0;
    background: #fff; cursor: pointer; transition: border-color .2s, background .2s, transform .1s;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: #555;
    position: relative; overflow: hidden;
  }
  .avatar-btn:hover   { border-color: #c5e1a5; transform: scale(1.05); }
  .avatar-btn.sel     { border-color: #8bc34a; background: #f1f8e9; }

  /* AI Avatar face inside circle */
  .av-face {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin-bottom: 6px;
    border: 2px solid rgba(139,195,74,.3);
    position: relative; overflow: hidden;
    flex-shrink: 0;
  }
  .av-face img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  }
  .av-face .av-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.8);
  }
  .av-face .av-loading::after {
    content: ''; width: 20px; height: 20px;
    border: 3px solid #8bc34a; border-top-color: transparent;
    border-radius: 50%; animation: spin .7s linear infinite;
  }

  .btn-green {
    display: block; width: 100%; font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 900; color: #fff; background: #8bc34a;
    border: none; border-radius: 18px; padding: 16px; cursor: pointer;
    border-bottom: 5px solid #689f38;
    transition: transform .1s, border-bottom-width .1s, background .15s, opacity .15s;
    user-select: none;
  }
  .btn-green:hover:not(:disabled)  { background: #7cb342; }
  .btn-green:active:not(:disabled) { border-bottom-width: 0; transform: translateY(5px); }
  .btn-green:disabled { background: #d0d0d0; border-bottom-color: #bbb; cursor: not-allowed; opacity: .7; }

  /* ===== DASHBOARD ===== */
  #view-dashboard { background: #f1f8e9; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.88); backdrop-filter: blur(10px);
    border-bottom: 1.5px solid #e8e8e8; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
  }
  .topbar-user { display: flex; align-items: center; gap: 10px; }
  .topbar-avatar {
    width: 44px; height: 44px; background: #e8f5e9;
    border: 2.5px solid #8bc34a; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; overflow: hidden;
  }
  .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .topbar-name { font-weight: 800; color: #444; font-size: 15px; }

  .topbar-stats { display: flex; gap: 10px; }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    font-weight: 800; font-size: 15px; padding: 6px 14px;
    border-radius: 20px; border: 1.5px solid;
  }
  .stat-pill.xp     { color: #1565c0; background: #e3f2fd; border-color: #bbdefb; }
  .stat-pill.streak { color: #e65100; background: #fff3e0; border-color: #ffcc80; }
  .stat-pill.streak.dead { color: #aaa; background: #f5f5f5; border-color: #e0e0e0; }
  .stat-pill svg { width: 20px; height: 20px; }

  .map-container {
    max-width: 480px; margin: 0 auto;
    padding: 28px 20px 80px;
    display: flex; flex-direction: column; align-items: center;
  }

  .module-header {
    width: 100%; border-radius: 28px; padding: 22px 24px; color: #fff;
    box-shadow: 0 6px 24px rgba(0,0,0,.13); border-bottom: 6px solid rgba(0,0,0,.12);
    margin-bottom: 28px; position: relative; overflow: hidden;
  }
  .module-header h3 { font-size: 28px; font-weight: 900; }
  .module-header p  { font-size: 16px; font-weight: 700; opacity: .9; margin-top: 2px; }
  .module-header .mod-icon {
    position: absolute; right: -14px; bottom: -14px;
    font-size: 90px; opacity: .18; transform: rotate(-12deg);
  }

  .lessons-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 22px; width: 100%; margin-bottom: 36px;
  }

  .node-wrap { position: relative; }

  .lesson-node {
    width: 76px; height: 76px; border-radius: 50%; border: none;
    border-bottom: 6px solid rgba(0,0,0,.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900; color: #fff;
    cursor: pointer; transition: transform .12s, border-bottom-width .12s, box-shadow .12s;
    position: relative; user-select: none;
    box-shadow: 0 4px 12px rgba(0,0,0,.10);
  }
  .lesson-node:hover:not(.locked)  { transform: scale(1.08); }
  .lesson-node:active:not(.locked) { border-bottom-width: 0; transform: translateY(6px); }
  .lesson-node.locked  { background: #d9d9d9; border-bottom-color: #bbb; color: #888; cursor: not-allowed; }
  .lesson-node.done    { background: #ffc107; border-bottom-color: #ff9800; }

  .float-badge {
    position: absolute; top: -46px; left: 50%; transform: translateX(-50%);
    background: #fff; border: 2px solid #e8e8e8; border-radius: 18px;
    padding: 6px 16px; font-size: 14px; font-weight: 800; color: #444;
    white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.10);
    animation: floatBadge 2s ease-in-out infinite; z-index: 10;
  }
  .float-badge::after {
    content: ''; position: absolute; bottom: -7px; left: 50%;
    transform: translateX(-50%) rotate(45deg); width: 12px; height: 12px;
    background: #fff; border-right: 2px solid #e8e8e8; border-bottom: 2px solid #e8e8e8;
  }

  .connector {
    position: absolute; top: 76px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 22px; background: #d0e8b8; border-radius: 7px;
  }

  /* ===== LESSON ===== */
  #view-lesson { background: #fff; }

  .lesson-topbar {
    position: sticky; top: 0; z-index: 50; background: #fff;
    border-bottom: 2px solid #f0f0f0; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .close-btn {
    background: none; border: none; cursor: pointer; color: #aaa;
    padding: 4px; border-radius: 8px; transition: color .15s; flex-shrink: 0;
  }
  .close-btn:hover { color: #555; }
  .close-btn svg { width: 24px; height: 24px; display: block; }

  .progress-bar-wrap {
    flex: 1; height: 20px; background: #eee; border-radius: 10px;
    overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,.08);
  }
  .progress-bar-fill {
    height: 100%; background: #8bc34a; border-radius: 10px;
    transition: width .6s ease; position: relative;
  }
  .progress-bar-fill::after {
    content: ''; position: absolute; top: 4px; left: 6px; right: 6px; height: 5px;
    background: rgba(255,255,255,.35); border-radius: 3px;
  }

  .lesson-content {
    flex: 1; max-width: 640px; width: 100%; margin: 0 auto; padding: 28px 20px 0;
  }
  .lesson-question {
    font-size: 26px; font-weight: 900; color: #1a1a1a;
    text-align: center; margin-bottom: 28px; line-height: 1.3;
  }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .opt-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 12px; border-radius: 24px; border: 3px solid #e0e0e0;
    background: #fff; cursor: pointer; font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 800; color: #444;
    border-bottom-width: 5px;
    transition: transform .1s, border-color .15s, background .15s, opacity .2s;
    user-select: none;
  }
  .opt-btn .opt-emoji { font-size: 52px; margin-bottom: 10px; }
  .opt-btn:hover:not(:disabled):not(.sel):not(.correct):not(.wrong) { background: #fafafa; border-color: #bbb; }
  .opt-btn:active:not(:disabled) { transform: translateY(5px); border-bottom-width: 0; }
  .opt-btn.sel     { border-color: #42a5f5; background: #e3f2fd; color: #1565c0; }
  .opt-btn.correct { border-color: #7cb342; background: #f1f8e9; color: #558b2f; }
  .opt-btn.wrong   { border-color: #ef5350; background: #ffebee; color: #c62828; }
  .opt-btn.dim     { opacity: .45; filter: grayscale(40%); }
  .opt-btn:disabled { cursor: not-allowed; }

  .lesson-footer {
    padding: 16px 20px; border-top: 2px solid;
    transition: background .25s, border-color .25s;
    position: sticky; bottom: 0; z-index: 40;
  }
  .lesson-footer.neutral { background: #fff;    border-color: #f0f0f0; }
  .lesson-footer.good    { background: #f1f8e9; border-color: #aed581; }
  .lesson-footer.bad     { background: #ffebee; border-color: #ef9a9a; }

  .footer-inner {
    max-width: 640px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .feedback-text { flex: 1; }
  .feedback-text .fb-main {
    display: flex; align-items: center; gap: 10px;
    font-size: 22px; font-weight: 900;
  }
  .feedback-text .fb-main.good { color: #558b2f; }
  .feedback-text .fb-main.bad  { color: #c62828; }
  .feedback-text .fb-sub { font-size: 14px; font-weight: 700; color: #888; margin-bottom: 2px; }
  .check-icon { font-size: 32px; animation: bounceLoop 1.5s ease-in-out infinite; }

  .btn-check {
    flex-shrink: 0; font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 900; color: #fff;
    border: none; border-radius: 16px; padding: 14px 32px;
    cursor: pointer; border-bottom: 5px solid;
    transition: transform .1s, border-bottom-width .1s, background .15s, opacity .15s;
    user-select: none;
  }
  .btn-check.green { background: #8bc34a; border-bottom-color: #689f38; }
  .btn-check.green:hover:not(:disabled) { background: #7cb342; }
  .btn-check.red   { background: #ef5350; border-bottom-color: #c62828; }
  .btn-check.red:hover { background: #e53935; }
  .btn-check:active:not(:disabled) { border-bottom-width: 0; transform: translateY(5px); }
  .btn-check:disabled { background: #d9d9d9; border-bottom-color: #bbb; cursor: not-allowed; opacity: .7; }

  /* ===== AI CHAT BUBBLE on avatar select ===== */
  .ai-badge {
    position: absolute; top: -2px; right: -2px;
    background: linear-gradient(135deg, #ff9800, #ff5722);
    color: #fff; font-size: 9px; font-weight: 900;
    padding: 2px 5px; border-radius: 8px; line-height: 1;
  }

  /* Module colors */
  .mc-0 { background: #4caf50; } .mc-1 { background: #26a69a; }
  .mc-2 { background: #26c6da; } .mc-3 { background: #29b6f6; }
  .mc-4 { background: #42a5f5; } .mc-5 { background: #5c6bc0; }
  .mc-6 { background: #7e57c2; } .mc-7 { background: #ab47bc; }
  .mc-8 { background: #e040fb; }
</style>
</head>
<body>

<!-- ===== ONBOARDING ===== -->
<div id="view-onboarding" class="view active">
  <div class="card">
    <div class="ob-logo">
      <div class="ob-logo-icon">🇰🇿</div>
      <h1>English Grade 3</h1>
      <p>Давай учить английский вместе!</p>
    </div>

    <div id="ob-step1" class="ob-step active">
      <h2>Как тебя зовут?</h2>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="input-name" placeholder="Введи своё имя" autocomplete="off" oninput="checkStep1()"/>
      </div>
      <button class="btn-green" id="btn-step1" disabled onclick="goStep(2)">Дальше</button>
    </div>

    <div id="ob-step2" class="ob-step">
      <h2>Когда твой день рождения?</h2>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <input type="date" id="input-dob" oninput="checkStep2()"/>
      </div>
      <button class="btn-green" id="btn-step2" disabled onclick="goStep(3)">Дальше</button>
    </div>

    <div id="ob-step3" class="ob-step">
      <h2>Выбери своего героя</h2>
      <p style="text-align:center;color:#888;font-size:13px;margin-bottom:12px;">✨ ИИ нарисует аватар твоего героя!</p>
      <div class="avatar-grid" id="avatar-grid"></div>
      <button class="btn-green" id="btn-step3" disabled onclick="finishOnboarding()">Начать учиться!</button>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="view-dashboard" class="view">
  <div class="topbar">
    <div class="topbar-user">
      <div class="topbar-avatar" id="tb-avatar"></div>
      <span class="topbar-name" id="tb-name"></span>
    </div>
    <div class="topbar-stats">
      <div class="stat-pill xp">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span id="xp-val">0 XP</span>
      </div>
      <div class="stat-pill streak dead" id="stat-streak">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="flame-icon">
          <path d="M12 2c0 0-5 5-5 11a5 5 0 0 0 10 0C17 7 12 2 12 2z"/>
        </svg>
        <span id="streak-val">0</span>
      </div>
    </div>
  </div>
  <div class="map-container" id="map-container"></div>
</div>

<!-- ===== LESSON ===== -->
<div id="view-lesson" class="view">
  <div class="lesson-topbar">
    <button class="close-btn" onclick="exitLesson()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="lesson-progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="lesson-content">
    <div class="lesson-question" id="lesson-question"></div>
    <div class="options-grid" id="options-grid"></div>
  </div>
  <div class="lesson-footer neutral" id="lesson-footer">
    <div class="footer-inner">
      <div class="feedback-text" id="feedback-area"></div>
      <button class="btn-check green" id="btn-check" disabled onclick="handleCheck()">Проверить</button>
    </div>
  </div>
</div>

// ===================== DATA =====================

  { id:'dog',       emoji:'🐶', name:'Щенок',     prompt:'cute puppy face, cartoon avatar, floppy ears, big brown eyes, golden fur, happy expression, children illustration style, circle portrait' },
  { id:'frog',      emoji:'🐸', name:'Лягушка',   prompt:'cute baby frog face, cartoon avatar, big round eyes, bright green, cheerful smile, children illustration style, circle portrait' },
  { id:'koala',     emoji:'🐨', name:'Коала',     prompt:'cute baby koala face, cartoon avatar, round fluffy ears, big grey nose, soft grey fur, children illustration style, circle portrait' },
  { id:'unicorn',   emoji:'🦄', name:'Единорог',  prompt:'cute baby unicorn face, cartoon avatar, rainbow mane, sparkly horn, big blue eyes, pastel colors, children illustration style, circle portrait' },
  { id:'dragon',    emoji:'🐲', name:'Дракончик', prompt:'cute baby dragon face, cartoon avatar, tiny horns, big green eyes, teal scales, friendly smile, children illustration style, circle portrait' },
  { id:'hamster',   emoji:'🐹', name:'Хомяк',    prompt:'cute hamster face, cartoon avatar, chubby cheeks, tiny ears, big black eyes, beige fur, children illustration style, circle portrait' },
];

const QUESTIONS = [
  { text:'Как сказать «Привет»?',
    opts:[{id:'a',t:'Goodbye',e:'👋'},{id:'b',t:'Hello',e:'🖐️'},{id:'c',t:'Apple',e:'🍎'},{id:'d',t:'Dog',e:'🐶'}], ans:'b' },
  { text:'Выбери правильный перевод: «Школьный рюкзак»',
    opts:[{id:'a',t:'Pencil case',e:'✏️'},{id:'b',t:'Schoolbag',e:'🎒'},{id:'c',t:'Rubber',e:'🧽'},{id:'d',t:'Pen',e:'🖊️'}], ans:'b' },
  { text:'Где здесь «Кот»?',
    opts:[{id:'a',t:'Cat',e:'🐱'},{id:'b',t:'Dog',e:'🐶'},{id:'c',t:'Bird',e:'🐦'},{id:'d',t:'Fish',e:'🐟'}], ans:'a' },
  { text:'Как сказать «Я» по-английски?',
    opts:[{id:'a',t:'You',e:'👉'},{id:'b',t:'He',e:'👦'},{id:'c',t:'I',e:'🙋‍♂️'},{id:'d',t:'She',e:'👧'}], ans:'c' },
  { text:'Что означает слово «Red»?',
    opts:[{id:'a',t:'Синий',e:'🔵'},{id:'b',t:'Зелёный',e:'🟢'},{id:'c',t:'Красный',e:'🔴'},{id:'d',t:'Жёлтый',e:'🟡'}], ans:'c' }
];

// ===================== STATE =====================
let user     = null;
let progress = { completed:[], currentId:1, streak:0, xp:0 };
let lesson   = { id:null, qIdx:0, sel:null, checked:false, score:0 };
let obAvatar = null;
// Cache AI-generated images: { avatarId: dataURL }
const aiImageCache = {};

// ===================== AI IMAGE GENERATION =====================
async function generateAvatarImage(avatar) {
  if (aiImageCache[avatar.id]) return aiImageCache[avatar.id];

  try {
    const response = await fetch(WORKER_URL + '/generate-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: avatar.prompt })
    });
    if (!response.ok) throw new Error('Worker error');
    const data = await response.json();
    if (data.imageUrl) {
      aiImageCache[avatar.id] = data.imageUrl;
      return data.imageUrl;
    }
  } catch (e) {
    console.warn('AI image failed for', avatar.id, e);
  }
  return null;
}

// ===================== ONBOARDING =====================
(function buildAvatarGrid() {
  const grid = document.getElementById('avatar-grid');
  AVATARS.forEach(av => {
    const btn = document.createElement('button');
    btn.className = 'avatar-btn';
    btn.dataset.id = av.id;

    const face = document.createElement('div');
    face.className = 'av-face';
    face.id = 'face-' + av.id;
    face.innerHTML = `<span>${av.emoji}</span>`;

    const nameEl = document.createElement('span');
    nameEl.textContent = av.name;

    const aiBadge = document.createElement('span');
    aiBadge.className = 'ai-badge';
    aiBadge.textContent = 'AI';

    btn.appendChild(face);
    btn.appendChild(nameEl);
    btn.appendChild(aiBadge);
    btn.onclick = () => selectAvatar(av, btn);
    grid.appendChild(btn);

    // Load AI image in background
    loadAvatarImage(av);
  });
})();

async function loadAvatarImage(av) {
  const face = document.getElementById('face-' + av.id);
  if (!face) return;

  // Show loading spinner
  face.innerHTML = `<div class="av-loading"></div>`;

  const url = await generateAvatarImage(av);
  if (url) {
    face.innerHTML = `<img src="${url}" alt="${av.name}" />`;
  } else {
    // Fallback to emoji
    face.innerHTML = `<span>${av.emoji}</span>`;
  }
}

function selectAvatar(av, btn) {
  obAvatar = av;
  document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('btn-step3').disabled = false;
}

function checkStep1() {
  document.getElementById('btn-step1').disabled = document.getElementById('input-name').value.trim().length < 2;
}
function checkStep2() {
  document.getElementById('btn-step2').disabled = !document.getElementById('input-dob').value;
}
function goStep(n) {
  document.querySelectorAll('.ob-step').forEach(s => s.classList.remove('active'));
  document.getElementById('ob-step' + n).classList.add('active');
}
function finishOnboarding() {
  user = {
    name:   document.getElementById('input-name').value.trim(),
    dob:    document.getElementById('input-dob').value,
    avatar: obAvatar
  };
  showDashboard();
}

// ===================== DASHBOARD =====================
function showDashboard() {
  switchView('dashboard');
  // Set topbar avatar
  const tbAvatar = document.getElementById('tb-avatar');
  if (aiImageCache[user.avatar.id]) {
    tbAvatar.innerHTML = `<img src="${aiImageCache[user.avatar.id]}" alt="${user.avatar.name}"/>`;
  } else {
    tbAvatar.textContent = user.avatar.emoji;
    // Try loading
    generateAvatarImage(user.avatar).then(url => {
      if (url) tbAvatar.innerHTML = `<img src="${url}" alt="${user.avatar.name}"/>`;
    });
  }
  document.getElementById('tb-name').textContent = user.name;
  updateTopbar();
  buildMap();
}

function updateTopbar() {
  document.getElementById('xp-val').textContent = progress.xp + ' XP';
  document.getElementById('streak-val').textContent = progress.streak;
  const sp = document.getElementById('stat-streak');
  const fi = document.getElementById('flame-icon');
  if (progress.streak > 0) {
    sp.classList.remove('dead');
    fi.setAttribute('fill', 'currentColor');
    fi.setAttribute('stroke', 'none');
  } else {
    sp.classList.add('dead');
    fi.setAttribute('fill', 'none');
    fi.setAttribute('stroke', 'currentColor');
  }
}

function buildMap() {
  const container = document.getElementById('map-container');
  container.innerHTML = '';
  let gid = 1;

  MODULES.forEach((mod, mi) => {
    const mh = document.createElement('div');
    mh.className = `module-header mc-${mi}`;
    mh.innerHTML = `<div style="position:relative;z-index:1"><h3>Unit ${mod.id}</h3><p>${mod.title}</p></div><div class="mod-icon">📖</div>`;
    container.appendChild(mh);

    const col = document.createElement('div');
    col.className = 'lessons-col';

    for (let i = 0; i < mod.lessons; i++) {
      const lid     = gid++;
      const done    = progress.completed.includes(lid);
      const current = progress.currentId === lid;
      const locked  = lid > progress.currentId;
      const offsetX = Math.sin(i * 1.5) * 42;

      const wrap = document.createElement('div');
      wrap.className = 'node-wrap';
      wrap.style.transform = `translateX(${offsetX}px)`;

      if (i < mod.lessons - 1) {
        const conn = document.createElement('div');
        conn.className = 'connector';
        wrap.appendChild(conn);
      }

      if (current) {
        const badge = document.createElement('div');
        badge.className = 'float-badge';
        badge.textContent = 'Start!';
        wrap.appendChild(badge);
      }

      const btn = document.createElement('button');
      let cls = 'lesson-node';
      if (done)   cls += ' done';
      if (locked) cls += ' locked';
      if (!done && !locked) cls += ` mc-${mi}`;
      btn.className = cls;
      btn.disabled  = locked;
      btn.innerHTML = done ? '⭐' : locked ? '🔒' : `<span>${i+1}</span>`;
      if (!locked) btn.onclick = () => startLesson(lid);

      wrap.appendChild(btn);
      col.appendChild(wrap);
    }
    container.appendChild(col);
  });
}

// ===================== LESSON =====================
function startLesson(lid) {
  lesson = { id:lid, qIdx:0, sel:null, checked:false, score:0 };
  switchView('lesson');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[lesson.qIdx];
  document.getElementById('lesson-progress-fill').style.width = (lesson.qIdx / QUESTIONS.length * 100) + '%';

  const qEl = document.getElementById('lesson-question');
  qEl.textContent = q.text;
  qEl.classList.remove('anim-pop');
  void qEl.offsetWidth;
  qEl.classList.add('anim-pop');

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.dataset.id = opt.id;
    btn.innerHTML = `<span class="opt-emoji">${opt.e}</span><span>${opt.t}</span>`;
    btn.onclick = () => selectOpt(opt.id, btn);
    grid.appendChild(btn);
  });

  setFooter('neutral', '');
  const cb = document.getElementById('btn-check');
  cb.textContent = 'Проверить';
  cb.className   = 'btn-check green';
  cb.disabled    = true;
  cb.onclick     = handleCheck;
  lesson.sel = null;
  lesson.checked = false;
}

function selectOpt(id, btn) {
  if (lesson.checked) return;
  lesson.sel = id;
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('btn-check').disabled = false;
}

function handleCheck() {
  if (lesson.checked) return;
  lesson.checked = true;
  const q = QUESTIONS[lesson.qIdx];
  const correct = lesson.sel === q.ans;
  if (correct) lesson.score += 20;

  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    const bid = b.dataset.id;
    if (bid === q.ans) { b.classList.remove('sel'); b.classList.add('correct'); }
    else if (bid === lesson.sel && !correct) {
      b.classList.remove('sel'); b.classList.add('wrong');
      void b.offsetWidth; b.classList.add('anim-shake');
      setTimeout(() => b.classList.remove('anim-shake'), 500);
    } else { b.classList.add('dim'); }
  });

  const cb = document.getElementById('btn-check');
  cb.onclick = handleContinue;
  document.getElementById('lesson-progress-fill').style.width = ((lesson.qIdx + 1) / QUESTIONS.length * 100) + '%';

  if (correct) {
    setFooter('good', `<div class="fb-main good"><span class="check-icon">✅</span> Великолепно!</div>`);
    cb.className = 'btn-check green';
  } else {
    const ct = q.opts.find(o => o.id === q.ans).t;
    setFooter('bad', `<div class="fb-sub">Правильный ответ:</div><div class="fb-main bad">${ct}</div>`);
    cb.className = 'btn-check red';
  }
  cb.textContent = 'Дальше';
  cb.disabled = false;
}

function handleContinue() {
  if (lesson.qIdx < QUESTIONS.length - 1) {
    lesson.qIdx++; lesson.checked = false; renderQuestion();
  } else {
    completeLesson(lesson.score);
  }
}

function setFooter(state, html) {
  document.getElementById('lesson-footer').className = 'lesson-footer ' + state;
  document.getElementById('feedback-area').innerHTML = html;
}

function completeLesson(score) {
  const lid = lesson.id;
  const isNew = !progress.completed.includes(lid);
  if (isNew) {
    progress.completed.push(lid);
    progress.currentId = lid + 1;
    if (progress.streak === 0) progress.streak = 1;
  }
  progress.xp += score > 80 ? 15 : 10;
  showDashboard();
}

function exitLesson() { showDashboard(); }

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  window.scrollTo(0, 0);
}
</script>
</body>
