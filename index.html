<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#8bc34a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>DaraBala — Вход</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:"Nunito",sans-serif;
  min-height:100vh;
  background:linear-gradient(160deg,#b2ebf2 0%,#c8e6c9 45%,#e8d5b7 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;overflow:hidden;position:relative;
}
.bg-blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.15;pointer-events:none;
  animation:bFloat 18s ease-in-out infinite alternate;}
@keyframes bFloat{0%{transform:translate(0,0)}100%{transform:translate(var(--tx,30px),var(--ty,-40px))}}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.card{
  background:rgba(255,255,255,.96);backdrop-filter:blur(20px);
  border-radius:32px;padding:36px 28px 32px;
  width:calc(100% - 24px);max-width:420px;
  box-shadow:0 12px 48px rgba(0,0,0,.16);
  text-align:center;position:relative;z-index:1;
  animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
}

/* Logo */
.logo-wrap{display:flex;justify-content:center;margin-bottom:12px;}
.logo-img{animation:bob 2.5s ease-in-out infinite;}
.app-title{font-size:36px;font-weight:900;color:#2e7d32;letter-spacing:-1px;margin-bottom:4px;}
.app-sub{font-size:13px;color:#aaa;font-weight:700;margin-bottom:28px;line-height:1.5;}

/* Steps */
.step{display:none;animation:fadeIn .3s ease both;}
.step.active{display:block;}

/* Google btn */
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:15px 20px;border-radius:18px;
  border:2px solid #e0e0e0;background:#fff;cursor:pointer;
  font-family:"Nunito",sans-serif;font-size:16px;font-weight:800;color:#333;
  box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;margin-bottom:12px;
}
.google-btn:hover{border-color:#8bc34a;background:#f9fbe7;transform:translateY(-2px);}
.google-logo{width:22px;height:22px;flex-shrink:0;}

/* Divider */
.divider{display:flex;align-items:center;gap:10px;color:#ccc;font-size:13px;font-weight:700;margin:14px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee;}

/* Guest btn */
.guest-btn{
  width:100%;padding:15px;border-radius:18px;border:2px solid #e8e8e8;
  background:linear-gradient(135deg,#f1f8e9,#dcedc8);cursor:pointer;
  font-family:Nunito,sans-serif;font-size:16px;font-weight:800;color:#33691e;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;
}
.guest-btn:hover{background:linear-gradient(135deg,#dcedc8,#c5e1a5);transform:translateY(-1px);}

/* Role select */
.role-title{font-size:20px;font-weight:900;color:#2e7d32;margin-bottom:8px;}
.role-sub{font-size:13px;color:#aaa;font-weight:700;margin-bottom:22px;}
.role-btn{
  width:100%;padding:18px 20px;border-radius:20px;border:2.5px solid #e8e8e8;
  background:#fff;cursor:pointer;font-family:Nunito,sans-serif;
  display:flex;align-items:center;gap:14px;transition:all .2s;margin-bottom:14px;
  text-align:left;box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.role-btn:hover{border-color:#8bc34a;background:#f9fbe7;transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,195,74,.2);}
.role-icon{font-size:38px;flex-shrink:0;}
.role-info{}
.role-name{font-size:17px;font-weight:900;color:#2e7d32;}
.role-desc{font-size:12px;font-weight:700;color:#aaa;margin-top:3px;}
.role-badge{font-size:11px;font-weight:900;border-radius:10px;padding:4px 10px;flex-shrink:0;}
.badge-green{background:#e8f5e9;color:#388e3c;}
.badge-blue{background:#e3f2fd;color:#1565c0;}

/* Returning user */
.returning-card{
  display:flex;align-items:center;gap:14px;background:#f1f8e9;
  border-radius:18px;padding:14px 16px;margin-bottom:16px;
  border:2px solid #c5e1a5;text-align:left;
}
.btn-green{
  background:linear-gradient(135deg,#8bc34a,#558b2f);color:#fff;
  border:none;border-radius:18px;padding:15px 28px;
  font-family:Nunito,sans-serif;font-size:16px;font-weight:900;
  cursor:pointer;width:100%;transition:all .2s;
  box-shadow:0 4px 16px rgba(139,195,74,.4);
  border-bottom:4px solid rgba(0,0,0,.15);margin-bottom:12px;
}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(139,195,74,.5);}
.btn-back{
  background:none;border:none;color:#aaa;font-family:Nunito,sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-back:hover{color:#555;}
.hint{font-size:11px;color:#ccc;font-weight:700;margin-top:16px;line-height:1.5;}
</style>
</head>
<body>

<div class="bg-blob" style="width:500px;height:500px;top:-100px;left:-100px;background:radial-gradient(circle,#8bc34a,#33691e);--tx:40px;--ty:-30px"></div>
<div class="bg-blob" style="width:400px;height:400px;bottom:-80px;right:-80px;background:radial-gradient(circle,#aed581,#558b2f);--tx:-50px;--ty:40px;animation-duration:14s"></div>

<div class="card">
  <!-- Logo header -->
  <div class="logo-wrap">
    <img src="icons/icon-192.png" width="72" height="72" class="logo-img" alt="DaraBala"
      onerror="this.outerHTML='<svg viewBox=\'0 0 80 80\' width=\'72\' height=\'72\' class=\'logo-img\'><defs><linearGradient id=\'g\' x1=\'0%\' y1=\'0%\' x2=\'100%\' y2=\'100%\'><stop offset=\'0%\' stop-color=\'#8bc34a\'/><stop offset=\'100%\' stop-color=\'#2e7d32\'/></linearGradient></defs><circle cx=\'40\' cy=\'40\' r=\'38\' fill=\'url(#g)\'/><text x=\'40\' y=\'52\' text-anchor=\'middle\' font-size=\'36\' font-family=\'Nunito,Arial\' font-weight=\'900\' fill=\'white\'>D</text></svg>'"/>
  </div>
  <div class="app-title">DaraBala</div>
  <div class="app-sub">Умная платформа для учёбы<br>English · Python · Казахстан</div>

  <!-- STEP 1: Login -->
  <div class="step active" id="step-login">

    <div id="returning-wrap" style="display:none">
      <div class="returning-card" id="returning-preview"></div>
      <button class="btn-green" onclick="continueAsReturning()">
        Продолжить как <span id="returning-name"></span>
      </button>
      <div class="divider">или</div>
    </div>

    <button class="google-btn" onclick="doGoogleLogin()">
      <svg class="google-logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Войти через Google
    </button>

    <div class="divider">или</div>
    <button class="guest-btn" onclick="doGuestLogin()">👤 Войти как гость</button>
    <div class="hint">Прогресс гостя сохраняется только в этом браузере</div>
  </div>

  <!-- STEP 2: Role select -->
  <div class="step" id="step-role">
    <div class="role-title">Добро пожаловать! 👋</div>
    <div class="role-sub">Кто ты сегодня?</div>

    <button class="role-btn" onclick="goToRole('student')">
      <div class="role-icon">🎒</div>
      <div class="role-info">
        <div class="role-name">Мир Ученика</div>
        <div class="role-desc">Уроки · Задания · ИИ-учитель</div>
      </div>
      <span class="role-badge badge-green">3-7 класс</span>
    </button>

    <button class="role-btn" onclick="goToRole('teacher')">
      <div class="role-icon">📋</div>
      <div class="role-info">
        <div class="role-name">Кабинет Учителя</div>
        <div class="role-desc">КСП · Тесты · ИИ-помощник</div>
      </div>
      <span class="role-badge badge-blue">Педагог</span>
    </button>

    <button class="btn-back" onclick="goBack()">← Сменить аккаунт</button>
  </div>
</div>

<script>
const GOOGLE_CLIENT_ID = '533836977579-vmtqmhrmtemrbo44loi5vjr9rv87jenj.apps.googleusercontent.com';
let _currentUser = null;

// Init
window.addEventListener('DOMContentLoaded', () => {
  // Check saved user
  const saved = localStorage.getItem('darabala_user');
  if (saved) {
    try {
      const u = JSON.parse(saved);
      _currentUser = u;
      showReturning(u);
    } catch(e) { localStorage.removeItem('darabala_user'); }
  }

  // Init Google
  if (window.google && GOOGLE_CLIENT_ID) {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleCred,
      auto_select: false
    });
  }

  // Register SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/DaraBala/sw.js').catch(() => {});
  }
});

function showReturning(u) {
  const wrap = document.getElementById('returning-wrap');
  const preview = document.getElementById('returning-preview');
  const nameEl = document.getElementById('returning-name');
  nameEl.textContent = u.name.split(' ')[0];
  preview.innerHTML = `
    <div style="width:44px;height:44px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid #c5e1a5;flex-shrink:0">
      ${u.picture ? `<img src="${u.picture}" style="width:44px;height:44px;border-radius:50%;object-fit:cover" referrerpolicy="no-referrer">` : '👤'}
    </div>
    <div>
      <div style="font-size:15px;font-weight:900;color:#333">${u.name}</div>
      <div style="font-size:12px;color:#aaa;font-weight:700">${u.email || 'Гостевой аккаунт'}</div>
    </div>`;
  wrap.style.display = 'block';
}

function continueAsReturning() {
  if (_currentUser) afterLogin(_currentUser);
}

function doGoogleLogin() {
  if (!window.google) { doGuestLogin(); return; }
  google.accounts.id.prompt(n => {
    if (n.isNotDisplayed() || n.isSkippedMoment()) doGuestLogin();
  });
}

function handleGoogleCred(response) {
  const parts = response.credential.split('.');
  const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
  afterLogin({ name: payload.name, email: payload.email, picture: payload.picture, source: 'google' });
}

function doGuestLogin() {
  afterLogin({ name: 'Гость ' + Math.floor(Math.random() * 9000 + 1000), email: null, picture: null, source: 'guest' });
}

function afterLogin(user) {
  _currentUser = user;
  localStorage.setItem('darabala_user', JSON.stringify(user));
  // Show role selector
  document.getElementById('step-login').classList.remove('active');
  document.getElementById('step-role').classList.add('active');
}

function goToRole(role) {
  // Save the chosen role
  sessionStorage.setItem('darabala_role', role);
  if (role === 'student') {
    window.location.href = 'student/';
  } else {
    window.location.href = 'teacher/';
  }
}

function goBack() {
  localStorage.removeItem('darabala_user');
  _currentUser = null;
  document.getElementById('step-role').classList.remove('active');
  document.getElementById('step-login').classList.add('active');
  document.getElementById('returning-wrap').style.display = 'none';
}
</script>
</body>
</html>
